name: Feature request
description: Idea for a new widget, metric, or workflow.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the workflow you're trying to support or the question you want to answer. Avoid jumping straight to a solution — the "why" matters.
      placeholder: |
        I want to see which files burn the most money per edit,
        not just total — so I can spot "expensive per-touch" files
        that I keep re-reading unnecessarily.
    validations: { required: true }

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Sketch the UI / behaviour if you have one. OK to leave blank if you don't.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried to get this info another way? What didn't work?
