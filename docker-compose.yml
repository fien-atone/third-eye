services:
  third-eye:
    build:
      context: .
      dockerfile: Dockerfile
    image: third-eye:latest
    container_name: third-eye
    restart: unless-stopped
    ports:
      - "4317:4317"
    volumes:
      # Host ~/.claude -> /data/claude (read-only). Contains the projects/ subfolder.
      # ${USER_HOME} falls back to ${HOME} (unix) / ${USERPROFILE} (windows).
      # Override via .env file if neither is set — see README "Windows" section.
      - "${USER_HOME:-${HOME:-${USERPROFILE}}}/.claude:/data/claude:ro"
      # Codex dir (safe to remove if Codex is unused).
      - "${USER_HOME:-${HOME:-${USERPROFILE}}}/.codex:/data/codex:ro"
      # Persist SQLite across container restarts
      - "./server/data:/app/server/data"
    environment:
      CLAUDE_CONFIG_DIR: /data/claude
      CODEX_HOME: /data/codex
      CODEBURN_DB: /app/server/data/third-eye.db
      # Auto-refresh inside the container. Set to 0 to disable.
      CODEBURN_INGEST_INTERVAL_MIN: "15"
      CODEBURN_INGEST_SINCE: "2h"
      # Bind to all interfaces inside the container so docker port-mapping reaches us.
      # On the host, only the ports listed under `ports:` above are exposed — stays safe.
      CODEBURN_HOST: "0.0.0.0"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4317/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
